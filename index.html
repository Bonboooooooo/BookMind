<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>BookMind 图书查询平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, "Microsoft YaHei", sans-serif;
            background: #f0f2f5;
            color: #333;
        }

        .container {
            width: 90%;
            max-width: 960px;
            margin: 40px auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #1a73e8;
            font-size: 28px;
            margin-bottom: 8px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .search-box {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
        }

        .search-box input {
            width: 360px;
            padding: 12px 16px;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 8px;
            outline: none;
        }

        .search-box input:focus {
            border-color: #1a73e8;
        }

        .search-box button {
            padding: 12px 28px;
            font-size: 16px;
            background: #1a73e8;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .search-box button:hover {
            background: #1557b0;
        }

        .result-area {
            background: #fff;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
            min-height: 100px;
        }

        .result-info {
            color: #888;
            font-size: 14px;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid #eee;
        }

        .book-card {
            padding: 16px;
            margin-bottom: 12px;
            border: 1px solid #e8e8e8;
            border-radius: 8px;
            background: #fafbfc;
        }

        .book-card:hover {
            background: #f0f4ff;
            border-color: #c0d4f0;
        }

        .book-title {
            font-size: 18px;
            font-weight: bold;
            color: #1a73e8;
            margin-bottom: 8px;
        }

        .book-info {
            color: #555;
            line-height: 1.8;
            font-size: 14px;
        }

        .book-info span {
            margin-right: 20px;
        }

        .book-desc {
            color: #888;
            font-size: 13px;
            margin-top: 8px;
            line-height: 1.6;
        }

        .no-result {
            text-align: center;
            color: #999;
            padding: 40px 0;
            font-size: 16px;
        }

        .loading {
            text-align: center;
            color: #1a73e8;
            padding: 40px 0;
        }

        .error {
            text-align: center;
            color: #e74c3c;
            padding: 40px 0;
        }

        @media (max-width: 600px) {
            .search-box {
                flex-direction: column;
            }

            .search-box input {
                width: 100%;
            }

            .search-box button {
                width: 100%;
            }

            .container {
                margin: 20px auto;
                padding: 0 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>BookMind 图书查询平台</h1>
            <p>基于阿里云生态的图书查询与数据可视化系统</p>
        </div>

        <div class="search-box">
            <input type="text" id="keyword" placeholder="输入书名、作者、出版社或关键词">
            <button onclick="searchBooks()">查询</button>
        </div>

        <div class="result-area" id="result">
            <div class="no-result">请输入关键词开始查询</div>
        </div>
    </div>

    <script>
        // 你的函数计算接口地址，替换成你自己的
        const API_BASE = "https://bookmind-yzujqqnphx.cn-hangzhou.fcapp.run";

        function searchBooks() {
            const keyword = document.getElementById("keyword").value.trim();
            const resultDiv = document.getElementById("result");

            if (!keyword) {
                resultDiv.innerHTML = '<div class="no-result">请输入关键词</div>';
                return;
            }

            resultDiv.innerHTML = '<div class="loading">查询中...</div>';

            const apiUrl = API_BASE + "/books?keyword=" + encodeURIComponent(keyword);

            fetch(apiUrl)
                .then(function(response) {
                    if (!response.ok) {
                        throw new Error("接口返回错误：" + response.status);
                    }
                    return response.json();
                })
                .then(function(result) {
                    if (result.success && result.data && result.data.length > 0) {
                        renderBooks(result.data, result.total);
                    } else if (result.success && result.data && result.data.length === 0) {
                        resultDiv.innerHTML = '<div class="no-result">未找到相关书籍，请尝试其他关键词</div>';
                    } else {
                        resultDiv.innerHTML = '<div class="error">查询失败：' + (result.message || "未知错误") + '</div>';
                    }
                })
                .catch(function(error) {
                    resultDiv.innerHTML = '<div class="error">查询失败，请检查网络或后端接口是否正常</div>';
                    console.error("查询错误：", error);
                });
        }

        function renderBooks(books, total) {
            const resultDiv = document.getElementById("result");

            let html = '<div class="result-info">共找到 ' + total + ' 条结果，当前显示 ' + books.length + ' 条</div>';

            for (var i = 0; i < books.length; i++) {
                var book = books[i];
                html += '<div class="book-card">';
                html += '<div class="book-title">' + (book.title || "未知书名") + '</div>';
                html += '<div class="book-info">';
                html += '<span>作者：' + (book.author || "未知") + '</span>';
                html += '<span>出版社：' + (book.publisher || "未知") + '</span>';
                html += '<span>分类：' + (book.category || "未分类") + '</span>';
                html += '<span>出版年份：' + (book.publish_year || "未知") + '</span>';
                html += '</div>';
                if (book.country || book.language) {
                    html += '<div class="book-info" style="margin-top:4px">';
                    html += '<span>国家/地区：' + (book.country || "未知") + '</span>';
                    html += '<span>语言：' + (book.language || "未知") + '</span>';
                    html += '</div>';
                }
                if (book.description) {
                    html += '<div class="book-desc">' + book.description + '</div>';
                }
                html += '</div>';
            }

            resultDiv.innerHTML = html;
        }

        // 回车键也能触发查询
        document.getElementById("keyword").addEventListener("keypress", function(e) {
            if (e.key === "Enter") {
                searchBooks();
            }
        });
    </script>
</body>
</html>
