<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookMind 图书查询平台</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, "Microsoft YaHei", sans-serif;
            background: #f0f2f5;
            color: #333;
            min-height: 100vh;
        }
        .container {
            width: 90%;
            max-width: 960px;
            margin: 40px auto;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header h1 {
            color: #1a73e8;
            font-size: 28px;
            margin-bottom: 8px;
        }
        .header p {
            color: #666;
            font-size: 14px;
        }

        /* ===== 搜索框 ===== */
        .search-box {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        .search-box input {
            width: 400px;
            padding: 12px 16px;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 8px;
            outline: none;
        }
        .search-box input:focus { border-color: #1a73e8; }
        .search-box button {
            padding: 12px 28px;
            font-size: 16px;
            background: #1a73e8;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        .search-box button:hover { background: #1557b0; }

        /* ===== AI 智能查询 ===== */
        .ai-box {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        .ai-box input {
            width: 400px;
            padding: 12px 16px;
            font-size: 15px;
            border: 2px solid #e8a0ff;
            border-radius: 8px;
            outline: none;
        }
        .ai-box input:focus { border-color: #9b59b6; }
        .ai-box button {
            padding: 12px 28px;
            font-size: 15px;
            background: #9b59b6;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        .ai-box button:hover { background: #8e44ad; }
        .ai-hint {
            text-align: center;
            color: #999;
            font-size: 12px;
            margin-bottom: 20px;
        }

        /* ===== 筛选框 ===== */
        .filter-box {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .filter-box select {
            padding: 10px 14px;
            font-size: 14px;
            border: 2px solid #ddd;
            border-radius: 8px;
            background: #fff;
            min-width: 150px;
            outline: none;
        }
        .filter-box select:focus { border-color: #1a73e8; }

        /* ===== 结果区域 ===== */
        .result-area {
            background: #fff;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            min-height: 100px;
        }
        .result-info {
            color: #888;
            font-size: 14px;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid #eee;
        }
        .book-card {
            padding: 16px;
            margin-bottom: 12px;
            border: 1px solid #e8e8e8;
            border-radius: 8px;
            background: #fafbfc;
            cursor: pointer;
            transition: background 0.2s;
        }
        .book-card:hover {
            background: #f0f4ff;
            border-color: #c0d4f0;
        }
        .book-title {
            font-size: 18px;
            font-weight: bold;
            color: #1a73e8;
            margin-bottom: 8px;
        }
        .book-info {
            color: #555;
            line-height: 1.8;
            font-size: 14px;
        }
        .book-info span { margin-right: 20px; }
        .book-desc {
            color: #888;
            font-size: 13px;
            margin-top: 8px;
            line-height: 1.6;
        }
        .no-result {
            text-align: center;
            color: #999;
            padding: 40px 0;
            font-size: 16px;
        }
        .loading {
            text-align: center;
            color: #1a73e8;
            padding: 40px 0;
        }
        .error {
            text-align: center;
            color: #e74c3c;
            padding: 40px 0;
        }
        .ai-sql-box {
            background: #f5f0ff;
            border: 1px solid #e0d0f0;
            border-radius: 8px;
            padding: 12px 16px;
            margin-bottom: 16px;
            font-size: 13px;
            color: #6c3483;
            font-family: monospace;
            word-break: break-all;
        }

        /* ===== 分页 ===== */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin-top: 20px;
            padding: 16px;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .pagination button {
            padding: 8px 18px;
            font-size: 14px;
            background: #1a73e8;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        .pagination button:disabled { background: #ccc; cursor: not-allowed; }
        .pagination span { font-size: 14px; color: #555; }

        /* ===== 弹窗 ===== */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: #fff;
            padding: 28px;
            border-radius: 12px;
            max-width: 560px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            position: relative;
        }
        .modal-close {
            position: absolute;
            top: 12px; right: 16px;
            font-size: 24px;
            cursor: pointer;
            color: #999;
        }
        .modal-close:hover { color: #333; }
        .modal-title {
            font-size: 22px;
            font-weight: bold;
            color: #1a73e8;
            margin-bottom: 16px;
        }
        .modal-info {
            color: #555;
            line-height: 2;
            font-size: 15px;
        }
        .modal-desc {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #eee;
            color: #666;
            line-height: 1.8;
        }

        /* ===== 图表 ===== */
        .charts-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin: 30px 0 40px;
        }
        .chart-box {
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }
        .chart-box h3 {
            text-align: center;
            color: #333;
            font-size: 16px;
            margin-bottom: 12px;
        }

        @media (max-width: 800px) {
            .charts-grid { grid-template-columns: 1fr; }
        }
        @media (max-width: 600px) {
            .search-box, .ai-box { flex-direction: column; }
            .search-box input, .ai-box input,
            .search-box button, .ai-box button { width: 100%; }
            .filter-box { flex-direction: column; align-items: center; }
            .filter-box select { width: 100%; min-width: unset; }
            .container { margin: 20px auto; padding: 0 10px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>BookMind 图书查询平台</h1>
            <p>基于阿里云生态的图书查询与数据可视化系统</p>
        </div>

        <!-- 关键词搜索 -->
        <div class="search-box">
            <input type="text" id="keyword" placeholder="输入书名、作者、出版社或关键词">
            <button onclick="searchBooks(1)">查询</button>
        </div>

        <!-- AI 智能查询 -->
        <div class="ai-box">
            <input type="text" id="aiQuery" placeholder="用自然语言提问，如：2000年之后出版的科幻小说">
            <button onclick="aiSearch()">AI 智能查询</button>
        </div>
        <div class="ai-hint">支持自然语言查询，例如："余华写的书"、"2020年之后的计算机类图书"、"中国出版的科幻小说"</div>

        <!-- 筛选框 -->
        <div class="filter-box">
            <select id="filterCategory">
                <option value="">全部分类</option>
            </select>
            <select id="filterPublisher">
                <option value="">全部出版社</option>
            </select>
            <select id="filterCountry">
                <option value="">全部国家</option>
            </select>
        </div>

        <!-- 结果区域 -->
        <div class="result-area" id="result">
            <div class="no-result">请输入关键词开始查询，或使用 AI 智能查询</div>
        </div>

        <!-- 分页 -->
        <div class="pagination" id="pagination"></div>
    </div>

    <!-- 图表区域 -->
    <div class="container">
        <h2 style="text-align:center; color:#1a73e8; margin:30px 0 20px;">图书数据可视化</h2>
        <div class="charts-grid">
            <div class="chart-box">
                <h3>分类分布</h3>
                <div id="chartCategory" style="width:100%; height:300px;"></div>
            </div>
            <div class="chart-box">
                <h3>出版社 Top 10</h3>
                <div id="chartPublisher" style="width:100%; height:300px;"></div>
            </div>
            <div class="chart-box">
                <h3>出版年份趋势</h3>
                <div id="chartYear" style="width:100%; height:300px;"></div>
            </div>
            <div class="chart-box">
                <h3>国家/地区分布</h3>
                <div id="chartCountry" style="width:100%; height:300px;"></div>
            </div>
        </div>
    </div>

    <!-- 详情弹窗 -->
    <div class="modal" id="detailModal" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="modal-close" onclick="closeModal()">&times;</span>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        // ========================================
        // 配置区域 - 只需要修改这一个地址
        // ========================================
        var API_BASE = "https://bookmind-yzujqqnphx.cn-hangzhou.fcapp.run"; // 替换为你的实际地址

        // 分页全局变量
        var currentPage = 1;
        var currentPageSize = 20;
        var currentTotal = 0;

        // ========================================
        // 加载筛选选项
        // ========================================
        function loadFilters() {
            fetch(API_BASE + "/filters")
                .then(function(r) { return r.json(); })
                .then(function(result) {
                    if (result.success) {
                        fillSelect("filterCategory", result.categories || []);
                        fillSelect("filterPublisher", result.publishers || []);
                        fillSelect("filterCountry", result.countries || []);
                    }
                })
                .catch(function(err) {
                    console.error("加载筛选选项失败", err);
                });
        }

        function fillSelect(id, items) {
            var sel = document.getElementById(id);
            for (var i = 0; i < items.length; i++) {
                var opt = document.createElement("option");
                opt.value = items[i];
                opt.textContent = items[i];
                sel.appendChild(opt);
            }
        }

        // ========================================
        // 关键词搜索（支持分页和筛选）
        // ========================================
        function searchBooks(page) {
            if (!page) page = 1;
            currentPage = page;

            var keyword = document.getElementById("keyword").value.trim();
            var category = document.getElementById("filterCategory").value;
            var publisher = document.getElementById("filterPublisher").value;
            var country = document.getElementById("filterCountry").value;
            var resultDiv = document.getElementById("result");

            if (!keyword && !category && !publisher && !country) {
                resultDiv.innerHTML = '<div class="no-result">请输入关键词或选择筛选条件</div>';
                document.getElementById("pagination").innerHTML = "";
                return;
            }

            resultDiv.innerHTML = '<div class="loading">查询中...</div>';

            var params = [];
            params.push("page=" + currentPage);
            params.push("pageSize=" + currentPageSize);
            if (keyword) params.push("keyword=" + encodeURIComponent(keyword));
            if (category) params.push("category=" + encodeURIComponent(category));
            if (publisher) params.push("publisher=" + encodeURIComponent(publisher));
            if (country) params.push("country=" + encodeURIComponent(country));

            fetch(API_BASE + "/books?" + params.join("&"))
                .then(function(r) {
                    if (!r.ok) throw new Error("HTTP " + r.status);
                    return r.json();
                })
                .then(function(result) {
                    if (result.success && result.data && result.data.length > 0) {
                        currentTotal = result.total || 0;
                        renderBooks(result.data, result.total);
                        renderPagination();
                    } else if (result.success) {
                        resultDiv.innerHTML = '<div class="no-result">未找到相关书籍，请尝试其他关键词</div>';
                        document.getElementById("pagination").innerHTML = "";
                    } else {
                        resultDiv.innerHTML = '<div class="error">查询失败：' + (result.message || "未知错误") + '</div>';
                        document.getElementById("pagination").innerHTML = "";
                    }
                })
                .catch(function(err) {
                    resultDiv.innerHTML = '<div class="error">查询失败，请检查网络或后端接口</div>';
                    console.error(err);
                    document.getElementById("pagination").innerHTML = "";
                });
        }

        // ========================================
        // AI 智能查询（DeepSeek NL2SQL）
        // ========================================
        function aiSearch() {
            var query = document.getElementById("aiQuery").value.trim();
            var resultDiv = document.getElementById("result");

            if (!query) {
                alert("请输入查询问题");
                return;
            }

            resultDiv.innerHTML = '<div class="loading">AI 正在理解您的问题...</div>';
            document.getElementById("pagination").innerHTML = "";

            fetch(API_BASE + "/ai-search", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ query: query })
            })
                .then(function(r) {
                    if (!r.ok) throw new Error("HTTP " + r.status);
                    return r.json();
                })
                .then(function(result) {
                    if (result.success && result.data && result.data.length > 0) {
                        // 显示 AI 生成的 SQL
                        var sqlHtml = "";
                        if (result.sql) {
                            sqlHtml = '<div class="ai-sql-box">AI 生成的 SQL：' + escapeHtml(result.sql) + '</div>';
                        }
                        currentTotal = result.total || result.data.length;
                        renderBooks(result.data, currentTotal, sqlHtml);
                    } else if (result.success) {
                        var sqlHtml = "";
                        if (result.sql) {
                            sqlHtml = '<div class="ai-sql-box">AI 生成的 SQL：' + escapeHtml(result.sql) + '</div>';
                        }
                        resultDiv.innerHTML = sqlHtml + '<div class="no-result">未找到相关书籍</div>';
                    } else {
                        resultDiv.innerHTML = '<div class="error">AI 查询失败：' + (result.message || "未知错误") + '</div>';
                    }
                })
                .catch(function(err) {
                    resultDiv.innerHTML = '<div class="error">AI 查询失败，请检查网络或后端接口</div>';
                    console.error(err);
                });
        }

        function escapeHtml(text) {
            var div = document.createElement("div");
            div.textContent = text;
            return div.innerHTML;
        }

        // ========================================
        // 渲染图书列表
        // ========================================
        function renderBooks(books, total, prefixHtml) {
            var resultDiv = document.getElementById("result");
            var html = "";

            if (prefixHtml) html += prefixHtml;

            html += '<div class="result-info">共找到 ' + total + ' 条结果，当前显示 ' + books.length + ' 条</div>';

            for (var i = 0; i < books.length; i++) {
                var book = books[i];
                var bookJson = JSON.stringify(book).replace(/'/g, "&#39;");
                html += '<div class="book-card" onclick="showDetail(' + bookJson + ')">';
                html += '<div class="book-title">' + (book.title || "未知书名") + '</div>';
                html += '<div class="book-info">';
                html += '<span>作者：' + (book.author || "未知") + '</span>';
                html += '<span>出版社：' + (book.publisher || "未知") + '</span>';
                html += '<span>分类：' + (book.category || "未分类") + '</span>';
                html += '<span>出版年份：' + (book.publish_year || "未知") + '</span>';
                html += '</div>';
                if (book.country || book.language) {
                    html += '<div class="book-info" style="margin-top:4px">';
                    html += '<span>国家/地区：' + (book.country || "未知") + '</span>';
                    html += '<span>语言：' + (book.language || "未知") + '</span>';
                    html += '</div>';
                }
                if (book.description) {
                    html += '<div class="book-desc">' + book.description + '</div>';
                }
                html += '</div>';
            }

            resultDiv.innerHTML = html;
        }

        // ========================================
        // 渲染分页
        // ========================================
        function renderPagination() {
            var totalPages = Math.ceil(currentTotal / currentPageSize);
            var div = document.getElementById("pagination");

            if (totalPages <= 1) {
                div.innerHTML = "";
                return;
            }

            var html = "";
            html += '<button onclick="searchBooks(' + (currentPage - 1) + ')" ' + (currentPage <= 1 ? "disabled" : "") + '>上一页</button>';
            html += '<span>第 ' + currentPage + ' / ' + totalPages + ' 页</span>';
            html += '<button onclick="searchBooks(' + (currentPage + 1) + ')" ' + (currentPage >= totalPages ? "disabled" : "") + '>下一页</button>';
            html += '<span>共 ' + currentTotal + ' 条</span>';
            div.innerHTML = html;
        }

        // ========================================
        // 详情弹窗
        // ========================================
        function showDetail(book) {
            var modal = document.getElementById("detailModal");
            var body = document.getElementById("modalBody");

            body.innerHTML =
                '<div class="modal-title">' + (book.title || "未知") + '</div>' +
                '<div class="modal-info">' +
                '作者：' + (book.author || "未知") + '<br>' +
                '出版社：' + (book.publisher || "未知") + '<br>' +
                '分类：' + (book.category || "未分类") + '<br>' +
                '出版年份：' + (book.publish_year || "未知") + '<br>' +
                '国家/地区：' + (book.country || "未知") + '<br>' +
                '语言：' + (book.language || "未知") + '<br>' +
                'ISBN：' + (book.isbn || "暂无") +
                '</div>' +
                '<div class="modal-desc">' + (book.description || "暂无简介") + '</div>';

            modal.classList.add("active");
        }

        function closeModal(event) {
            if (!event || event.target.id === "detailModal" || event.target.className === "modal-close") {
                document.getElementById("detailModal").classList.remove("active");
            }
        }

        // ========================================
        // ECharts 图表
        // ========================================
        function loadCharts() {
            fetch(API_BASE + "/stats")
                .then(function(r) { return r.json(); })
                .then(function(result) {
                    if (!result.success) return;

                    var chartCat = echarts.init(document.getElementById("chartCategory"));
                    chartCat.setOption({
                        tooltip: { trigger: "axis" },
                        xAxis: { type: "category", data: result.categoryStats.map(function(r) { return r.name; }) },
                        yAxis: { type: "value" },
                        series: [{
                            type: "bar",
                            data: result.categoryStats.map(function(r) { return r.value; }),
                            itemStyle: { color: "#1a73e8" }
                        }]
                    });

                    var chartPub = echarts.init(document.getElementById("chartPublisher"));
                    chartPub.setOption({
                        tooltip: { trigger: "item" },
                        series: [{
                            type: "pie",
                            radius: ["40%", "70%"],
                            data: result.publisherStats.map(function(r) { return { name: r.name, value: r.value }; })
                        }]
                    });

                    var chartYear = echarts.init(document.getElementById("chartYear"));
                    chartYear.setOption({
                        tooltip: { trigger: "axis" },
                        xAxis: { type: "category", data: result.yearStats.map(function(r) { return r.year; }) },
                        yAxis: { type: "value" },
                        series: [{
                            type: "line",
                            data: result.yearStats.map(function(r) { return r.count; }),
                            smooth: true,
                            itemStyle: { color: "#34a853" }
                        }]
                    });

                    var chartCountry = echarts.init(document.getElementById("chartCountry"));
                    chartCountry.setOption({
                        tooltip: { trigger: "axis" },
                        xAxis: { type: "category", data: result.countryStats.map(function(r) { return r.name; }) },
                        yAxis: { type: "value" },
                        series: [{
                            type: "bar",
                            data: result.countryStats.map(function(r) { return r.value; }),
                            itemStyle: { color: "#fbbc05" }
                        }]
                    });
                })
                .catch(function(err) {
                    console.error("加载图表失败", err);
                });
        }

        // ========================================
        // 页面初始化
        // ========================================
        loadFilters();
        loadCharts();

        document.getElementById("keyword").addEventListener("keypress", function(e) {
            if (e.key === "Enter") searchBooks(1);
        });

        document.getElementById("aiQuery").addEventListener("keypress", function(e) {
            if (e.key === "Enter") aiSearch();
        });

        window.addEventListener("resize", function() {
            ["chartCategory", "chartPublisher", "chartYear", "chartCountry"].forEach(function(id) {
                var dom = document.getElementById(id);
                if (dom) {
                    var inst = echarts.getInstanceByDom(dom);
                    if (inst) inst.resize();
                }
            });
        });
    </script>
</body>
</html>
